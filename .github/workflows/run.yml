name: Run Qwen2.5 Chat API
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
      - name: Start API and tunnel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python app.py &
          echo "Waiting 120s for model to load..."
          sleep 120
          cloudflared tunnel --url http://localhost:7860 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 20
          URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "Tunnel URL: $URL"
          printf '{"url":"%s","status":"online","updated":"%s"}\n' "$URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > api_url.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api_url.json
          git commit -m "chore: update API URL [skip ci]" || true
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/PranayMahendrakar/qwen-runner.git" HEAD:main
          wait
