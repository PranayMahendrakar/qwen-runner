name: Run Qwen2.5 Chat API

on:
  workflow_dispatch:
    push:
        branches: [ main ]

        jobs:
          serve:
              runs-on: ubuntu-latest
                  timeout-minutes: 350

                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v3

                                          - name: Set up Python
                                                  uses: actions/setup-python@v4
                                                          with:
                                                                    python-version: '3.10'

                                                                          - name: Install dependencies
                                                                                  run: |
                                                                                            python -m pip install --upgrade pip
                                                                                                      pip install -r requirements.txt
                                                                                                      
                                                                                                            - name: Install cloudflared
                                                                                                                    run: |
                                                                                                                              wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
                                                                                                                                        sudo dpkg -i cloudflared-linux-amd64.deb
                                                                                                                                        
                                                                                                                                              - name: Start Flask API and expose via Cloudflare Tunnel
                                                                                                                                                      env:
                                                                                                                                                                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                        run: |
                                                                                                                                                                                  export PORT=7860
                                                                                                                                                                                            python app.py &
                                                                                                                                                                                                      APP_PID=$!
                                                                                                                                                                                                                echo "Flask started with PID $APP_PID"
                                                                                                                                                                                                                
                                                                                                                                                                                                                          # Wait for Flask to be ready
                                                                                                                                                                                                                                    for i in $(seq 1 30); do
                                                                                                                                                                                                                                                if curl -s http://localhost:7860 > /dev/null 2>&1; then
                                                                                                                                                                                                                                                              echo "Flask is up!"
                                                                                                                                                                                                                                                                            break
                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                    echo "Waiting for Flask... ($i/30)"
                                                                                                                                                                                                                                                                                                                sleep 10
                                                                                                                                                                                                                                                                                                                          done
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                    # Start cloudflared tunnel
                                                                                                                                                                                                                                                                                                                                              cloudflared tunnel --url http://localhost:7860 --no-autoupdate 2>&1 | tee /tmp/cf.log &
                                                                                                                                                                                                                                                                                                                                                        CF_PID=$!
                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                  # Wait for tunnel URL
                                                                                                                                                                                                                                                                                                                                                                            TUNNEL_URL=""
                                                                                                                                                                                                                                                                                                                                                                                      for i in $(seq 1 30); do
                                                                                                                                                                                                                                                                                                                                                                                                  TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
                                                                                                                                                                                                                                                                                                                                                                                                              if [ -n "$TUNNEL_URL" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Tunnel URL: $TUNNEL_URL"
                                                                                                                                                                                                                                                                                                                                                                                                                                          break
                                                                                                                                                                                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "Waiting for tunnel URL... ($i/30)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              sleep 5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        done
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if [ -z "$TUNNEL_URL" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Failed to get tunnel URL"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          cat /tmp/cf.log
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Write URL to api_url.json and push to repo
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "{\"url\": \"$TUNNEL_URL\", \"status\": \"online\", \"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > api_url.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git add api_url.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git commit -m "Update API URL [skip ci]" || echo "No changes"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "API live at: $TUNNEL_URL"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "Chat UI at: https://pranayMahendrakar.github.io/qwen-runner"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Keep alive for ~5.5 hours
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              wait $APP_PID
